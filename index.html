<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent Android WebView "Force Dark Mode" from inverting the page colours.
         Without this, the OS turns text white on light backgrounds, making typed
         text invisible in inputs on many budget Android devices. -->
    <meta name="color-scheme" content="light dark" />
    <title>Geekhoot — Premium Custom Merch</title>

    <!-- Favicons — multiple sizes so browsers, Google, and PWA all pick up the new logo.
         The ?v=3 cache-buster forces Google's crawler to re-fetch the new icon. -->
    <link rel="icon"             type="image/x-icon" href="/favicon.ico?v=3" />
    <link rel="icon"             type="image/png"    href="/favicon-16x16.png?v=3" sizes="16x16" />
    <link rel="icon"             type="image/png"    href="/favicon-32x32.png?v=3" sizes="32x32" />
    <link rel="icon"             type="image/png"    href="/logo.png?v=3"           sizes="any" />
    <link rel="apple-touch-icon" type="image/png"    href="/apple-touch-icon.png?v=3" sizes="180x180" />

    <!-- SEO -->
    <meta name="description" content="Geekhoot — your one-stop shop for premium custom merchandise, personalised gifts, and unique accessories delivered with care." />
    <meta name="keywords" content="geekhoot, custom merch, personalised gifts, online shop, custom printing, accessories" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mygeekhoot.onrender.com/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://mygeekhoot.onrender.com/" />
    <meta property="og:title"       content="Geekhoot — Premium Custom Merch" />
    <meta property="og:description" content="Your one-stop shop for premium custom merchandise, personalised gifts, and unique accessories delivered with care." />
    <meta property="og:image"       content="https://mygeekhoot.onrender.com/logo.png?v=3" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://mygeekhoot.onrender.com/" />
    <meta name="twitter:title"       content="Geekhoot — Premium Custom Merch" />
    <meta name="twitter:description" content="Your one-stop shop for premium custom merchandise, personalised gifts, and unique accessories delivered with care." />
    <meta name="twitter:image"       content="https://mygeekhoot.onrender.com/logo.png?v=3" />

    <!-- PWA -->
    <meta name="theme-color" content="#ff5200" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Geekhoot" />
    <!-- Critical resource hints -->
    <!-- Preconnect to image CDNs so DNS+TLS is ready before images are requested -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!-- Preload LCP hero image (desktop only — mobile hero is CSS gradient, no image) -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1000&auto=format&fit=crop&fm=webp"
      fetchpriority="high"
      media="(min-width: 1024px)"
    />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9691617107378387" crossorigin="anonymous"></script>

    <!-- Microsoft Clarity -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window,document,"clarity","script","wwxb3905iy");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/frontend/main.tsx"></script>
  </body>
</html>
